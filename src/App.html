<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Mastery Roadmap</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes node-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(139, 92, 246, 0); } }
        .node-pulse { animation: node-pulse 2s ease-in-out infinite; }
        .transition-smooth { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        @keyframes progress-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .progress-animated { background: linear-gradient(90deg, #8b5cf6 0%, #3b82f6 25%, #06b6d4 50%, #3b82f6 75%, #8b5cf6 100%); background-size: 200% 100%; animation: progress-shimmer 2s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // ==================== DATA ====================
        const roadmapData = [
            { id: 1, title: "Week 01", subtitle: "Big O & Arrays", topics: ["Time complexity", "Array operations"], steps: [{ id: 1, title: "Big O Notation", description: "Understand time and space complexity. Learn how to analyze algorithm efficiency." }, { id: 2, title: "Arrays Basics", description: "Master array operations, memory layout, and access patterns." }, { id: 3, title: "Practice Session", description: "Apply what you've learned. Solve array problems." }] },
            { id: 2, title: "Week 02", subtitle: "Two Pointers", topics: ["Sorted arrays", "Sliding window"], steps: [{ id: 1, title: "Two Pointer Pattern", description: "Learn the two-pointer technique for sorted arrays." }, { id: 2, title: "Sliding Window", description: "Master fixed and variable sliding window." }, { id: 3, title: "Practice Problems", description: "Solve 10+ problems using these techniques." }] },
            { id: 3, title: "Week 03", subtitle: "Strings", topics: ["String manipulation", "Character arrays"], steps: [{ id: 1, title: "String Basics", description: "Understand string immutability and operations." }, { id: 2, title: "String Methods", description: "Learn built-in string methods." }, { id: 3, title: "Practice Session", description: "Solve string problems." }] },
            { id: 4, title: "Week 04", subtitle: "Hashing", topics: ["HashMap", "HashSet"], steps: [{ id: 1, title: "Hashing Fundamentals", description: "Understand hash functions and collision handling." }, { id: 2, title: "HashMap & HashSet", description: "Master frequency counting and uniqueness." }, { id: 3, title: "Hashing Problems", description: "Solve two-sum and anagram problems." }] },
            { id: 5, title: "Week 05-06", subtitle: "Recursion", topics: ["Call stack", "Base cases"], steps: [{ id: 1, title: "Recursion Intuition", description: "Build mental model of recursion." }, { id: 2, title: "Base Cases", description: "Learn to identify correct base cases." }, { id: 3, title: "Recursive Patterns", description: "Master factorial, fibonacci patterns." }, { id: 4, title: "Practice Problems", description: "Solve 15+ recursion problems." }] },
            { id: 6, title: "Week 07-08", subtitle: "Sorting & Search", topics: ["Merge sort", "Binary search"], steps: [{ id: 1, title: "Basic Sorting", description: "Understand bubble, selection sort." }, { id: 2, title: "Merge Sort", description: "Master divide-and-conquer sorting." }, { id: 3, title: "Quick Sort", description: "Learn partitioning techniques." }, { id: 4, title: "Binary Search", description: "Master binary search on sorted arrays." }] },
            { id: 7, title: "Week 09-10", subtitle: "Linked Lists", topics: ["Singly", "Doubly", "Cycle"], steps: [{ id: 1, title: "Linked List Basics", description: "Understand node structure and traversal." }, { id: 2, title: "Reversal Patterns", description: "Master linked list reversal." }, { id: 3, title: "Cycle Detection", description: "Learn Floyd's algorithm." }, { id: 4, title: "Practice Problems", description: "Solve 15+ linked list problems." }] },
            { id: 8, title: "Week 11-12", subtitle: "Stacks & Queues", topics: ["LIFO", "FIFO"], steps: [{ id: 1, title: "Stack Operations", description: "Master push, pop, peek operations." }, { id: 2, title: "Queue Operations", description: "Understand FIFO and BFS." }, { id: 3, title: "Monotonic Stacks", description: "Learn next greater/smaller elements." }, { id: 4, title: "Practice Problems", description: "Solve stack problems." }] },
            { id: 9, title: "Week 13-14", subtitle: "Trees", topics: ["Binary trees", "Traversals", "BST"], steps: [{ id: 1, title: "Tree Basics", description: "Understand tree terminology." }, { id: 2, title: "Tree Traversals", description: "Master inorder, preorder, postorder." }, { id: 3, title: "Binary Search Trees", description: "Learn BST operations." }, { id: 4, title: "Practice Problems", description: "Solve 20+ tree problems." }] },
            { id: 10, title: "Week 15-16", subtitle: "Heaps & Graphs", topics: ["Priority queues", "BFS", "DFS"], steps: [{ id: 1, title: "Heap Fundamentals", description: "Understand heap properties." }, { id: 2, title: "Graph Basics", description: "Learn graph representation." }, { id: 3, title: "BFS & DFS", description: "Master breadth and depth-first search." }, { id: 4, title: "Practice Problems", description: "Solve heap and graph problems." }] },
            { id: 11, title: "Week 17-20", subtitle: "Graphs Advanced", topics: ["Dijkstra", "Topological sort"], steps: [{ id: 1, title: "Shortest Path", description: "Learn Dijkstra's algorithm." }, { id: 2, title: "Topological Sort", description: "Master DAG ordering." }, { id: 3, title: "Advanced Algorithms", description: "Learn about bridges." }, { id: 4, title: "Practice Problems", description: "Solve 20+ advanced graph problems." }] },
            { id: 12, title: "Week 21-24", subtitle: "Dynamic Programming", topics: ["1D DP", "2D DP"], steps: [{ id: 1, title: "DP Intuition", description: "Build understanding of overlapping subproblems." }, { id: 2, title: "1D DP", description: "Master fibonacci, climbing stairs." }, { id: 3, title: "2D DP", description: "Learn matrix DP, LCS." }, { id: 4, title: "Advanced DP", description: "Tackle knapsack problems." }, { id: 5, title: "Practice Problems", description: "Solve 30+ DP problems." }] },
            { id: 13, title: "Week 25-26", subtitle: "Final Sprint", topics: ["Greedy", "Bit manipulation", "Mocks"], steps: [{ id: 1, title: "Greedy Algorithms", description: "Learn activity selection patterns." }, { id: 2, title: "Bit Manipulation", description: "Master bitwise operations." }, { id: 3, title: "Mock Interviews", description: "Practice timed mocks." }, { id: 4, title: "Final Review", description: "Review all patterns." }] }
        ];

        const philosophyData = [
            { id: 1, icon: "Brain", title: "Intuition First", description: "Understand the 'why' before the 'how'." },
            { id: 2, icon: "Layers", title: "Deep Understanding", description: "Patterns over brute-force." },
            { id: 3, icon: "MessageSquare", title: "Think First, Code Second", description: "Plan before writing." },
            { id: 4, icon: "TrendingUp", title: "Quality Over Quantity", description: "Master key patterns thoroughly." }
        ];

        const iconMap = {
            Brain: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2a9 9 0 0 1 9 9c0 3.9-3.6 7-8 11-4.4-4-8-7.1-8-11a9 9 0 0 1 9-9z"/><path d="M12 2v4"/><path d="M12 8v4"/><circle cx="12" cy="14" r="2"/></svg>,
            Layers: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
            MessageSquare: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
            TrendingUp: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        };

        // ==================== HOOKS ====================
        const STORAGE_KEY = 'dsa-roadmap-progress';

        function useProgress() {
            const [progress, setProgress] = useState(() => {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try { return JSON.parse(stored); } catch { return null; }
                }
                return { currentWeek: 1, steps: {}, streak: 0, lastActiveDate: null, totalStepsCompleted: 0 };
            });

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            }, [progress]);

            const updateStreak = useCallback(() => {
                const today = new Date().toDateString();
                const lastActive = progress.lastActiveDate;
                if (lastActive === today) return;
                
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                
                let newStreak = progress.streak;
                if (lastActive !== yesterday.toDateString()) {
                    newStreak = lastActive ? 1 : progress.streak + 1;
                } else {
                    newStreak = progress.streak + 1;
                }
                
                setProgress(prev => ({ ...prev, streak: newStreak, lastActiveDate: today }));
            }, [progress.lastActiveDate, progress.streak]);

            const setCurrentWeek = useCallback((weekId) => {
                setProgress(prev => ({ ...prev, currentWeek: weekId }));
            }, []);

            const getStepStatus = useCallback((weekId, stepId) => {
                const key = `${weekId}-${stepId}`;
                return progress.steps[key] || 'not-started';
            }, [progress.steps]);

            const updateStepStatus = useCallback((weekId, stepId, status) => {
                const key = `${weekId}-${stepId}`;
                setProgress(prev => {
                    const oldStatus = prev.steps[key] || 'not-started';
                    const oldCompleted = Object.values(prev.steps).filter(s => s === 'completed').length;
                    let newTotalCompleted = prev.totalStepsCompleted;
                    if (oldStatus === 'completed' && status !== 'completed') {
                        newTotalCompleted = Math.max(0, oldCompleted);
                    } else if (status === 'completed' && oldStatus !== 'completed') {
                        newTotalCompleted = oldCompleted + 1;
                    }
                    return {
                        ...prev,
                        steps: { ...prev.steps, [key]: status },
                        totalStepsCompleted: newTotalCompleted
                    };
                });
                updateStreak();
            }, [updateStreak]);

            const getWeekProgress = useCallback((weekId, totalSteps) => {
                let completed = 0;
                for (let i = 1; i <= totalSteps; i++) {
                    if (getStepStatus(weekId, i) === 'completed') completed++;
                }
                return Math.round((completed / totalSteps) * 100);
            }, [getStepStatus]);

            const getOverallProgress = useCallback((totalWeeks, stepsPerWeek) => {
                const totalSteps = totalWeeks * stepsPerWeek;
                return Math.round((progress.totalStepsCompleted / totalSteps) * 100);
            }, [progress.totalStepsCompleted]);

            return { progress, setCurrentWeek, getStepStatus, updateStepStatus, getWeekProgress, getOverallProgress };
        }

        // ==================== COMPONENTS ====================
        function Sidebar({ weeks, selectedWeek, onWeekSelect, getStepStatus, getWeekProgress }) {
            const getWeekStatus = (weekId) => {
                const week = weeks.find(w => w.id === weekId);
                if (!week) return 'locked';
                const completedSteps = week.steps.filter(s => getStepStatus(weekId, s.id) === 'completed').length;
                const inProgressSteps = week.steps.filter(s => getStepStatus(weekId, s.id) === 'in-progress').length;
                if (completedSteps === week.steps.length) return 'completed';
                if (completedSteps > 0 || inProgressSteps > 0) return 'in-progress';
                if (weekId < selectedWeek) return 'available';
                if (weekId === selectedWeek) return 'current';
                return 'locked';
            };

            return (
                <aside className="w-72 bg-[#1e293b] border-r border-white/10 flex flex-col">
                    <div className="p-6 border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#8b5cf6] to-[#3b82f6] flex items-center justify-center">
                                <span className="text-white font-bold text-lg">DS</span>
                            </div>
                            <div>
                                <h1 className="text-lg font-semibold gradient-text">DSA Roadmap</h1>
                                <p className="text-xs text-slate-400">Mastery in 26 weeks</p>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4">
                        <h2 className="text-xs font-medium text-slate-400 uppercase tracking-wider mb-3 px-2">Learning Path</h2>
                        <div className="space-y-1">
                            {weeks.map((week) => {
                                const status = getWeekStatus(week.id);
                                const progress = getWeekProgress(week.id, week.steps.length);
                                const isSelected = selectedWeek === week.id;
                                return (
                                    <button key={week.id} onClick={() => onWeekSelect(week.id)}
                                        className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all duration-200 ${isSelected ? 'bg-gradient-to-r from-[#8b5cf6]/20 to-[#3b82f6]/20 border border-[#8b5cf6]/30' : 'hover:bg-[#334155] border border-transparent'}`}>
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold ${status === 'completed' ? 'bg-[#10b981] text-white' : ''} ${status === 'in-progress' || status === 'current' ? 'bg-[#8b5cf6] text-white node-pulse' : ''} ${status === 'available' ? 'bg-[#334155] text-slate-300 border border-slate-600' : ''} ${status === 'locked' ? 'bg-[#1e293b] text-slate-500 border border-slate-700' : ''}`}>
                                            {status === 'completed' ? '✓' : week.id}
                                        </div>
                                        <div className="flex-1 text-left min-w-0">
                                            <div className="text-sm font-medium text-slate-200 truncate">{week.title}</div>
                                            <div className="text-xs text-slate-400 truncate">{week.subtitle}</div>
                                        </div>
                                        <div className="w-12">
                                            <div className="h-1.5 bg-[#0f172a] rounded-full overflow-hidden">
                                                <div className={`h-full rounded-full transition-all duration-300 ${status === 'completed' ? 'bg-[#10b981]' : 'bg-gradient-to-r from-[#8b5cf6] to-[#3b82f6]'}`} style={{ width: `${progress}%` }} />
                                            </div>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </aside>
            );
        }

        function TopBar({ progress, streak, totalCompleted }) {
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            return (
                <header className="h-16 bg-[#1e293b]/50 border-b border-white/10 flex items-center justify-between px-6 backdrop-blur-sm">
                    <div>
                        <h2 className="text-sm font-medium text-slate-400 uppercase tracking-wider">Learning Dashboard</h2>
                        <p className="text-xs text-slate-500">{today}</p>
                    </div>
                    <div className="flex items-center gap-6">
                        <div className="flex items-center gap-2 px-4 py-2 bg-orange-500/10 rounded-xl">
                            <span className="text-orange-500">🔥</span>
                            <span className="text-orange-500 font-semibold">{streak}</span>
                            <span className="text-slate-400 text-sm">day streak</span>
                        </div>
                        <div className="flex items-center gap-2 px-4 py-2 bg-[#8b5cf6]/10 rounded-xl">
                            <span className="text-[#8b5cf6]">🎯</span>
                            <span className="text-[#8b5cf6] font-semibold">{totalCompleted}</span>
                            <span className="text-slate-400 text-sm">steps</span>
                        </div>
                        <div className="relative w-12 h-12">
                            <svg className="w-12 h-12 transform -rotate-90">
                                <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" strokeWidth="4" className="text-[#334155]" />
                                <circle cx="24" cy="24" r="20" fill="none" stroke="url(#progressGradient)" strokeWidth="4" strokeLinecap="round" strokeDasharray={125.6} strokeDashoffset={125.6 - (125.6 * progress) / 100} className="transition-all duration-500" />
                                <defs><linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#8b5cf6" /><stop offset="100%" stopColor="#3b82f6" /></linearGradient></defs>
                            </svg>
                            <span className="absolute inset-0 flex items-center justify-center text-sm font-semibold">{progress}%</span>
                        </div>
                    </div>
                </header>
            );
        }

        function MainContent({ week, selectedWeek, getStepStatus, onStepAction, getWeekProgress, philosophy, overallProgress, totalWeeks }) {
            const weekProgress = getWeekProgress(week.id, week.steps.length);

            const getActionButton = (stepId, status) => {
                switch (status) {
                    case 'not-started':
                        return <button onClick={() => onStepAction(stepId, status)} className="flex items-center gap-2 px-4 py-2 bg-[#8b5cf6]/20 hover:bg-[#8b5cf6]/30 text-[#8b5cf6] rounded-lg transition-all duration-200 text-sm font-medium">▶ Start</button>;
                    case 'in-progress':
                        return <button onClick={() => onStepAction(stepId, status)} className="flex items-center gap-2 px-4 py-2 bg-[#3b82f6]/20 hover:bg-[#3b82f6]/30 text-[#3b82f6] rounded-lg transition-all duration-200 text-sm font-medium">⏳ Continue</button>;
                    case 'completed':
                        return <button onClick={() => onStepAction(stepId, status)} className="flex items-center gap-2 px-4 py-2 bg-[#10b981]/20 hover:bg-[#10b981]/30 text-[#10b981] rounded-lg transition-all duration-200 text-sm font-medium">✓ Review</button>;
                    default: return null;
                }
            };

            const getStatusIcon = (status) => {
                switch (status) {
                    case 'completed': return <span className="text-[#10b981]">✓</span>;
                    case 'in-progress': return <span className="text-[#8b5cf6]">◐</span>;
                    default: return <span className="text-slate-500">○</span>;
                }
            };

            const getStatusBadge = (status) => {
                switch (status) {
                    case 'completed': return <span className="px-3 py-1 bg-[#10b981]/20 text-[#10b981] text-xs font-medium rounded-full">Completed</span>;
                    case 'in-progress': return <span className="px-3 py-1 bg-[#8b5cf6]/20 text-[#8b5cf6] text-xs font-medium rounded-full">In Progress</span>;
                    default: return <span className="px-3 py-1 bg-slate-700 text-slate-400 text-xs font-medium rounded-full">Not Started</span>;
                }
            };

            return (
                <main className="flex-1 overflow-y-auto p-8">
                    <div className="max-w-4xl mx-auto">
                        <div className="mb-8">
                            <div className="flex items-start justify-between mb-6">
                                <div>
                                    <h1 className="text-3xl font-bold text-white mb-2">DSA Mastery Roadmap</h1>
                                    <p className="text-slate-400">Zero to Google-Level in 6 Months</p>
                                </div>
                                <button className="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-[#8b5cf6] to-[#3b82f6] rounded-xl text-white font-semibold hover:shadow-lg hover:shadow-[#8b5cf6]/25 transition-all duration-300">▶ Continue Learning</button>
                            </div>
                            <div className="bg-[#1e293b] rounded-2xl p-4 border border-white/10">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-sm text-slate-400">Overall Progress</span>
                                    <span className="text-sm font-semibold text-[#06b6d4]">{overallProgress}%</span>
                                </div>
                                <div className="h-2 bg-[#0f172a] rounded-full overflow-hidden">
                                    <div className="h-full progress-animated rounded-full transition-all duration-500" style={{ width: `${overallProgress}%` }} />
                                </div>
                                <div className="flex items-center justify-between mt-2 text-xs text-slate-500">
                                    <span>{selectedWeek}/{totalWeeks} weeks completed</span>
                                    <span>Keep going! 🚀</span>
                                </div>
                            </div>
                        </div>

                        <section className="mb-10">
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h2 className="text-xl font-semibold text-white flex items-center gap-3">
                                        <span className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#8b5cf6] to-[#3b82f6] flex items-center justify-center text-white">{week.id}</span>
                                        {week.title}
                                    </h2>
                                    <p className="text-slate-400 mt-1">{week.subtitle}</p>
                                </div>
                                <div className="text-right">
                                    <div className="text-2xl font-bold text-[#06b6d4]">{weekProgress}%</div>
                                    <div className="text-xs text-slate-500">week progress</div>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-2 mb-6">
                                {week.topics.map((topic, idx) => (<span key={idx} className="px-3 py-1 bg-[#334155] rounded-lg text-sm text-slate-300">{topic}</span>))}
                            </div>
                            <div className="grid gap-4">
                                {week.steps.map((step) => {
                                    const status = getStepStatus(step.id);
                                    return (
                                        <div key={step.id} className={`bg-[#1e293b] rounded-2xl p-6 border transition-all duration-300 card-hover ${status === 'completed' ? 'border-[#10b981]/30' : status === 'in-progress' ? 'border-[#8b5cf6]/30' : 'border-white/10'}`}>
                                            <div className="flex items-start justify-between">
                                                <div className="flex items-start gap-4">
                                                    <div className="mt-1 text-xl">{getStatusIcon(status)}</div>
                                                    <div>
                                                        <div className="flex items-center gap-3 mb-1">
                                                            <h3 className="text-lg font-semibold text-white">{step.title}</h3>
                                                            {getStatusBadge(status)}
                                                        </div>
                                                        <p className="text-slate-400 text-sm leading-relaxed max-w-xl">{step.description}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">{getActionButton(step.id, status)}</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        <section>
                            <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">💡 Our Philosophy</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                {philosophy.map((item) => {
                                    const Icon = iconMap[item.icon] || iconMap.Brain;
                                    return (
                                        <div key={item.id} className="bg-[#1e293b] rounded-2xl p-5 border border-white/10 hover:border-[#8b5cf6]/30 transition-all duration-300 card-hover">
                                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#8b5cf6]/20 to-[#3b82f6]/20 flex items-center justify-center mb-4 text-[#8b5cf6]"><Icon /></div>
                                            <h3 className="text-sm font-semibold text-white mb-2">{item.title}</h3>
                                            <p className="text-xs text-slate-400 leading-relaxed">{item.description}</p>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>
                    </div>
                </main>
            );
        }

        // ==================== APP ====================
        function App() {
            const [selectedWeek, setSelectedWeek] = useState(1);
            const { progress, setCurrentWeek, getStepStatus, updateStepStatus, getWeekProgress, getOverallProgress } = useProgress();

            const currentWeekData = roadmapData.find(w => w.id === selectedWeek) || roadmapData[0];

            const handleWeekSelect = (weekId) => { setSelectedWeek(weekId); setCurrentWeek(weekId); };

            const handleStepAction = (stepId, currentStatus) => {
                let newStatus;
                switch (currentStatus) {
                    case 'not-started': newStatus = 'in-progress'; break;
                    case 'in-progress': newStatus = 'completed'; break;
                    case 'completed': newStatus = 'in-progress'; break;
                    default: newStatus = 'in-progress';
                }
                updateStepStatus(selectedWeek, stepId, newStatus);
            };

            const overallProgress = getOverallProgress(roadmapData.length, 4);

            return (
                <div className="flex min-h-screen bg-[#0f172a]">
                    <Sidebar weeks={roadmapData} selectedWeek={selectedWeek} onWeekSelect={handleWeekSelect} getStepStatus={getStepStatus} getWeekProgress={getWeekProgress} />
                    <div className="flex-1 flex flex-col">
                        <TopBar progress={overallProgress} streak={progress.streak} totalCompleted={progress.totalStepsCompleted} />
                        <MainContent week={currentWeekData} selectedWeek={selectedWeek} getStepStatus={(stepId) => getStepStatus(selectedWeek, stepId)} onStepAction={handleStepAction} getWeekProgress={(steps) => getWeekProgress(selectedWeek, steps)} philosophy={philosophyData} overallProgress={overallProgress} totalWeeks={roadmapData.length} />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
